<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K线训练营 - 多空模拟交易</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
        }
        
        body.dark {
            background: #1a1a1a;
        }
        
        body.dark .game-container {
            background: #252525;
        }
        
        body.dark .chart-area,
        body.dark .indicators-area,
        body.dark .control-panel {
            background: #252525;
            border-color: #333;
        }
        
        body.dark .stat-card,
        body.dark .speed-section {
            background: #2a2a2a;
            border-color: #333;
        }
        
        body.dark .stat-label,
        body.dark .speed-label {
            color: #aaa;
        }
        
        body.dark .stat-value {
            color: #fff;
        }
        
        body.dark .btn-secondary {
            background: #2a2a2a;
            color: #ccc;
            border: 1px solid #3a3a3a;
        }
        
        body.dark .symbol {
            color: #fff;
        }
        
        body.dark canvas {
            background: #1e1e1e;
            border-color: #333;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            background: white;
        }
        
        .chart-area {
            flex: 1;
            min-height: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .chart-area.expanded {
            flex: 2.5;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        
        .symbol-info {
            display: flex;
            gap: 10px;
            align-items: baseline;
        }
        
        .symbol {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .symbol-price {
            font-size: 24px;
            font-weight: 700;
            font-family: monospace;
            color: #ff6b6b;
        }
        
        .symbol-change {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            background: #f0f0f0;
        }
        
        .chart-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .indicator-toggle,
        .theme-switch {
            background: #f0f0f0;
            border: 1px solid #ddd;
            font-size: 12px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .indicator-toggle:active,
        .theme-switch:active {
            background: #e0e0e0;
        }
        
        .speed-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            background: #e8e8e8;
            color: #666;
        }
        
        .canvas-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .indicators-area {
            flex: 1.2;
            min-height: 0;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .indicators-area.hidden {
            flex: 0;
            padding: 0;
            display: none;
        }
        
        .indicator-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        .indicator-title {
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #666;
        }
        
        .indicator-canvas-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
        }
        
        .indicator-canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        
        .control-panel {
            flex-shrink: 0;
            padding: 12px;
        }
        
        .speed-section {
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 12px;
        }
        
        .speed-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
            color: #666;
        }
        
        .speed-value {
            color: #ff6b6b;
            font-weight: 600;
        }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            -webkit-appearance: none;
            background: #ddd;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
            border: none;
        }
        
        .trade-section {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        
        .btn-long {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-short {
            background: #4ecdc4;
            color: white;
        }
        
        .btn-close {
            background: #95a5a6;
            color: white;
        }
        
        .btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .stat-card {
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 8px 4px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 10px;
            margin-bottom: 4px;
            color: #888;
        }
        
        .stat-value {
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            color: #333;
        }
        
        .profit-positive {
            color: #ff6b6b;
        }
        
        .profit-negative {
            color: #4ecdc4;
        }
        
        .position-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .position-long {
            background: #ff6b6b20;
            color: #ff6b6b;
            border: 1px solid #ff6b6b40;
        }
        
        .position-short {
            background: #4ecdc420;
            color: #4ecdc4;
            border: 1px solid #4ecdc440;
        }
        
        .position-empty {
            background: #f0f0f0;
            color: #999;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-secondary {
            flex: 1;
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            background: #f0f0f0;
            border: 1px solid #ddd;
            font-family: inherit;
        }
        
        .btn-secondary:active {
            background: #e0e0e0;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            white-space: nowrap;
        }
        
        @media (max-width: 480px) {
            .symbol-price {
                font-size: 20px;
            }
            .stat-value {
                font-size: 12px;
            }
            .btn {
                padding: 8px 0;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="chart-area" id="chartArea">
        <div class="chart-header">
            <div class="symbol-info">
                <div class="symbol">K线训练</div>
                <div class="symbol-price" id="headerPrice">--</div>
                <div class="symbol-change" id="headerChange">--</div>
            </div>
            <div class="chart-controls">
                <button class="indicator-toggle" id="indicatorToggleBtn">隐藏</button>
                <button class="theme-switch" id="themeSwitch">🌙</button>
                <div class="speed-badge" id="speedBadge">⚡ 1.0x</div>
            </div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="kCanvas"></canvas>
        </div>
    </div>
    
    <div class="indicators-area" id="indicatorsArea">
        <div class="indicator-item">
            <div class="indicator-title">MACD (12,26,9)</div>
            <div class="indicator-canvas-wrapper">
                <canvas id="macdCanvas" class="indicator-canvas"></canvas>
            </div>
        </div>
        <div class="indicator-item">
            <div class="indicator-title">KDJ (9,3,3)</div>
            <div class="indicator-canvas-wrapper">
                <canvas id="kdjCanvas" class="indicator-canvas"></canvas>
            </div>
        </div>
    </div>
    
    <div class="control-panel">
        <div class="speed-section">
            <div class="speed-label">
                <span>K线更新速度</span>
                <span class="speed-value" id="speedValue">1.0x</span>
            </div>
            <input type="range" id="speedSlider" min="0.5" max="4" step="0.1" value="1">
        </div>
        
        <div class="trade-section">
            <button class="btn btn-long" id="longBtn">📈 做多</button>
            <button class="btn btn-short" id="shortBtn">📉 做空</button>
            <button class="btn btn-close" id="closeBtn">🔒 平仓</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">起始资金</div>
                <div class="stat-value" id="initialCapital">200,000</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">当前资金</div>
                <div class="stat-value" id="currentCapital">200,000</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">持仓</div>
                <div class="stat-value" id="positionStatus">空仓</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">持仓盈亏</div>
                <div class="stat-value" id="currentPL">0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总盈亏</div>
                <div class="stat-value" id="totalPL">0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">交易次数</div>
                <div class="stat-value" id="tradeCount">0</div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn-secondary" id="resetBtn">🔄 重置</button>
            <button class="btn-secondary" id="pauseBtn">▶️ 开始</button>
            <button class="btn-secondary" id="nextBtn">⏩ 下一根</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // 配置参数
    const INITIAL_PRICE = 100;
    const INITIAL_CAPITAL = 200000;
    const KLINE_COUNT = 150;  // 总K线数量
    const VISIBLE_COUNT = 50;  // 可见K线数量
    
    let indicatorsVisible = true;
    
    // 生成K线数据
    function generateKLineData() {
        const data = [];
        let price = INITIAL_PRICE;
        let trend = 0;
        
        for (let i = 0; i < KLINE_COUNT; i++) {
            if (Math.random() < 0.02) trend = (Math.random() - 0.5) * 1.2;
            const volatility = 1.2 + Math.abs(trend) * 0.5;
            const change = (Math.random() - 0.5 + trend) * volatility;
            const open = price;
            const close = price + change;
            const highLowSpread = Math.abs(change) + Math.random() * 1.5;
            const high = Math.max(open, close) + Math.random() * highLowSpread * 0.6;
            const low = Math.min(open, close) - Math.random() * highLowSpread * 0.4;
            
            data.push({
                open: Math.round(open * 100) / 100,
                close: Math.round(close * 100) / 100,
                high: Math.round(high * 100) / 100,
                low: Math.round(low * 100) / 100
            });
            price = close;
        }
        return data;
    }
    
    // EMA计算
    function calculateEMA(data, period) {
        const ema = new Array(data.length);
        const multiplier = 2 / (period + 1);
        for (let i = 0; i < data.length; i++) {
            if (i === 0) ema[i] = data[i];
            else ema[i] = (data[i] - ema[i-1]) * multiplier + ema[i-1];
        }
        return ema;
    }
    
    // MACD计算
    function calculateMACD(data) {
        const closes = data.map(k => k.close);
        const emaFast = calculateEMA(closes, 12);
        const emaSlow = calculateEMA(closes, 26);
        const macdLine = emaFast.map((v, i) => v - emaSlow[i]);
        const signalLine = calculateEMA(macdLine, 9);
        const histogram = macdLine.map((v, i) => v - signalLine[i]);
        return { macdLine, signalLine, histogram };
    }
    
    // KDJ计算
    function calculateKDJ(data) {
        const n = 9;
        const closes = data.map(k => k.close);
        const highs = data.map(k => k.high);
        const lows = data.map(k => k.low);
        const kValues = new Array(closes.length).fill(50);
        const dValues = new Array(closes.length).fill(50);
        const jValues = new Array(closes.length).fill(50);
        
        for (let i = 0; i < closes.length; i++) {
            if (i >= n - 1) {
                let highestHigh = -Infinity, lowestLow = Infinity;
                for (let j = i - n + 1; j <= i; j++) {
                    highestHigh = Math.max(highestHigh, highs[j]);
                    lowestLow = Math.min(lowestLow, lows[j]);
                }
                const rsv = (closes[i] - lowestLow) / (highestHigh - lowestLow) * 100;
                if (i === n - 1) {
                    kValues[i] = rsv;
                    dValues[i] = rsv;
                } else {
                    kValues[i] = (2/3) * kValues[i-1] + (1/3) * rsv;
                    dValues[i] = (2/3) * dValues[i-1] + (1/3) * kValues[i];
                }
                jValues[i] = 3 * kValues[i] - 2 * dValues[i];
            }
        }
        return { k: kValues, d: dValues, j: jValues };
    }
    
    // 绘制MACD
    function drawMACD(canvas, macdData, startIdx, endIdx) {
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const width = rect.width, height = rect.height;
        const padding = { left: 38, right: 28, top: 8, bottom: 8 };
        const chartWidth = width - padding.left - padding.right;
        const chartHeight = height - padding.top - padding.bottom;
        if (chartWidth <= 0) return;
        
        const isDark = document.body.classList.contains('dark');
        ctx.fillStyle = isDark ? '#1e1e1e' : 'white';
        ctx.fillRect(0, 0, width, height);
        
        const visibleMacd = macdData.macdLine.slice(startIdx, endIdx + 1);
        const visibleSignal = macdData.signalLine.slice(startIdx, endIdx + 1);
        const visibleHist = macdData.histogram.slice(startIdx, endIdx + 1);
        if (visibleMacd.length === 0) return;
        
        let minVal = Math.min(...visibleMacd, ...visibleSignal, ...visibleHist, 0);
        let maxVal = Math.max(...visibleMacd, ...visibleSignal, ...visibleHist, 0);
        const range = Math.max(Math.abs(maxVal), Math.abs(minVal));
        const valueToY = (val) => padding.top + chartHeight * (1 - (val + range) / (range * 2));
        
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
            const y = padding.top + (chartHeight / 4) * i;
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(width - padding.right, y);
            ctx.stroke();
        }
        
        const spacing = chartWidth / visibleMacd.length;
        const zeroY = valueToY(0);
        
        for (let i = 0; i < visibleHist.length; i++) {
            const x = padding.left + i * spacing;
            const histY = valueToY(visibleHist[i]);
            const barY = visibleHist[i] >= 0 ? zeroY : histY;
            ctx.fillStyle = visibleHist[i] >= 0 ? '#ff6b6b' : '#4ecdc4';
            ctx.fillRect(x - 2, barY, 4, Math.abs(histY - zeroY));
        }
        
        ctx.beginPath();
        ctx.strokeStyle = '#ff6b6b';
        ctx.lineWidth = 1;
        for (let i = 0; i < visibleMacd.length; i++) {
            const x = padding.left + i * spacing;
            const y = valueToY(visibleMacd[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        ctx.beginPath();
        ctx.strokeStyle = '#4ecdc4';
        for (let i = 0; i < visibleSignal.length; i++) {
            const x = padding.left + i * spacing;
            const y = valueToY(visibleSignal[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(padding.left, zeroY);
        ctx.lineTo(width - padding.right, zeroY);
        ctx.strokeStyle = '#aaa';
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    
    // 绘制KDJ
    function drawKDJ(canvas, kdjData, startIdx, endIdx) {
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const width = rect.width, height = rect.height;
        const padding = { left: 38, right: 28, top: 8, bottom: 8 };
        const chartWidth = width - padding.left - padding.right;
        const chartHeight = height - padding.top - padding.bottom;
        if (chartWidth <= 0) return;
        
        const isDark = document.body.classList.contains('dark');
        ctx.fillStyle = isDark ? '#1e1e1e' : 'white';
        ctx.fillRect(0, 0, width, height);
        
        const visibleK = kdjData.k.slice(startIdx, endIdx + 1);
        const visibleD = kdjData.d.slice(startIdx, endIdx + 1);
        const visibleJ = kdjData.j.slice(startIdx, endIdx + 1);
        if (visibleK.length === 0) return;
        
        const valueToY = (val) => padding.top + chartHeight * (1 - val / 100);
        
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
            const y = padding.top + (chartHeight / 4) * i;
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(width - padding.right, y);
            ctx.stroke();
        }
        
        const spacing = chartWidth / visibleK.length;
        
        ctx.beginPath();
        ctx.strokeStyle = '#ff6b6b';
        ctx.lineWidth = 1;
        for (let i = 0; i < visibleK.length; i++) {
            const x = padding.left + i * spacing;
            const y = valueToY(visibleK[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        ctx.beginPath();
        ctx.strokeStyle = '#4ecdc4';
        for (let i = 0; i < visibleD.length; i++) {
            const x = padding.left + i * spacing;
            const y = valueToY(visibleD[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        ctx.beginPath();
        ctx.strokeStyle = '#f5a623';
        for (let i = 0; i < visibleJ.length; i++) {
            const x = padding.left + i * spacing;
            const y = valueToY(visibleJ[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#aaa';
        [20, 50, 80].forEach(v => {
            const y = valueToY(v);
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(width - padding.right, y);
            ctx.stroke();
        });
        ctx.setLineDash([]);
    }
    
    // 绘制K线 - 从左向右滚动，固定可见数量
    function drawKLine() {
        const canvas = document.getElementById('kCanvas');
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const width = rect.width, height = rect.height;
        const padding = { left: 45, right: 35, top: 12, bottom: 20 };
        const chartWidth = width - padding.left - padding.right;
        const chartHeight = height - padding.top - padding.bottom;
        if (chartWidth <= 0) return;
        
        const isDark = document.body.classList.contains('dark');
        ctx.fillStyle = isDark ? '#1e1e1e' : 'white';
        ctx.fillRect(0, 0, width, height);
        
        // 计算可见范围：从 currentIndex - VISIBLE_COUNT + 1 到 currentIndex
        let startIdx = currentIndex - VISIBLE_COUNT + 1;
        if (startIdx < 0) startIdx = 0;
        const endIdx = currentIndex;
        const visibleData = klineData.slice(startIdx, endIdx + 1);
        
        if (visibleData.length === 0) return;
        
        // 计算价格范围
        let minPrice = Infinity, maxPrice = -Infinity;
        visibleData.forEach(k => {
            minPrice = Math.min(minPrice, k.low);
            maxPrice = Math.max(maxPrice, k.high);
        });
        const buffer = (maxPrice - minPrice) * 0.05;
        minPrice -= buffer;
        maxPrice += buffer;
        const priceRange = maxPrice - minPrice;
        const priceToY = (price) => padding.top + chartHeight * (1 - (price - minPrice) / priceRange);
        
        // 网格线
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
            const y = padding.top + (chartHeight / 4) * i;
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(width - padding.right, y);
            ctx.stroke();
        }
        
        // Y轴价格标签
        ctx.fillStyle = '#888';
        ctx.font = '9px monospace';
        for (let i = 0; i <= 4; i++) {
            const price = maxPrice - (maxPrice - minPrice) * (i / 4);
            const y = padding.top + (chartHeight / 4) * i;
            ctx.fillText(price.toFixed(1), 5, y + 4);
        }
        
        // 固定每个K线的宽度，不随数量变化
        const candleWidth = Math.max(3, Math.min(5, chartWidth / VISIBLE_COUNT * 0.7));
        const spacing = chartWidth / VISIBLE_COUNT;
        
        // 绘制K线 - 位置固定，从左到右排列
        visibleData.forEach((k, idx) => {
            // 计算位置：第idx根K线在可见区域中的位置
            const x = padding.left + idx * spacing;
            const openY = priceToY(k.open);
            const closeY = priceToY(k.close);
            const highY = priceToY(k.high);
            const lowY = priceToY(k.low);
            const isUp = k.close >= k.open;
            
            // 影线
            ctx.beginPath();
            ctx.moveTo(x, highY);
            ctx.lineTo(x, lowY);
            ctx.strokeStyle = isUp ? '#ff6b6b' : '#4ecdc4';
            ctx.stroke();
            
            // 实体
            const rectY = isUp ? closeY : openY;
            const rectHeight = Math.abs(closeY - openY);
            if (rectHeight > 2) {
                if (isUp) {
                    ctx.strokeStyle = '#ff6b6b';
                    ctx.strokeRect(x - candleWidth / 2, rectY, candleWidth, rectHeight);
                } else {
                    ctx.fillStyle = '#4ecdc4';
                    ctx.fillRect(x - candleWidth / 2, rectY, candleWidth, rectHeight);
                }
            } else {
                if (isUp) {
                    ctx.strokeStyle = '#ff6b6b';
                    ctx.strokeRect(x - candleWidth / 2, rectY - 1, candleWidth, 2);
                } else {
                    ctx.fillStyle = '#4ecdc4';
                    ctx.fillRect(x - candleWidth / 2, rectY - 1, candleWidth, 2);
                }
            }
        });
        
        // 当前价格线
        const currentPrice = klineData[currentIndex].close;
        const currentY = priceToY(currentPrice);
        ctx.beginPath();
        ctx.moveTo(padding.left, currentY);
        ctx.lineTo(width - padding.right, currentY);
        ctx.strokeStyle = '#ff6b6b';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#ff6b6b';
        ctx.fillText(`${currentPrice.toFixed(2)}`, width - padding.right + 5, currentY - 3);
        
        // 显示当前K线位置标记
        const currentX = padding.left + (visibleData.length - 1) * spacing;
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.arc(currentX, currentY, 3, 0, Math.PI * 2);
        ctx.fill();
    }
    
    function drawIndicators() {
        if (!indicatorsVisible) return;
        if (!macdData || !kdjData) return;
        
        let startIdx = currentIndex - VISIBLE_COUNT + 1;
        if (startIdx < 0) startIdx = 0;
        const endIdx = currentIndex;
        
        drawMACD(document.getElementById('macdCanvas'), macdData, startIdx, endIdx);
        drawKDJ(document.getElementById('kdjCanvas'), kdjData, startIdx, endIdx);
    }
    
    // 游戏状态
    let klineData = generateKLineData();
    let currentIndex = 0;
    let position = null;
    let totalProfit = 0;
    let tradeCount = 0;
    let currentCapital = INITIAL_CAPITAL;
    let isRunning = false;
    let intervalId = null;
    let currentSpeed = 1.0;
    let macdData = null;
    let kdjData = null;
    
    function updateIndicators() {
        macdData = calculateMACD(klineData);
        kdjData = calculateKDJ(klineData);
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1500);
    }
    
    function calculateCurrentProfit() {
        if (!position) return 0;
        const price = klineData[currentIndex].close;
        if (position.type === 'long') return (price - position.entryPrice) * position.shares;
        return (position.entryPrice - price) * position.shares;
    }
    
    function closePosition(showMsg = true) {
        if (!position) {
            if (showMsg) showToast('⚠️ 当前无持仓');
            return;
        }
        const profit = calculateCurrentProfit();
        totalProfit += profit;
        currentCapital = INITIAL_CAPITAL + totalProfit;
        tradeCount++;
        if (showMsg) showToast(`${position.type === 'long' ? '做多' : '做空'} 平仓 ${profit >= 0 ? '+' : ''}${profit.toFixed(2)}`);
        position = null;
        updateUI();
        drawKLine();
        drawIndicators();
    }
    
    function openPosition(type) {
        if (position) {
            showToast('请先平仓');
            return;
        }
        const price = klineData[currentIndex].close;
        const shares = Math.floor(currentCapital / price);
        if (shares === 0) {
            showToast('资金不足');
            return;
        }
        position = { type, entryPrice: price, shares };
        showToast(`${type === 'long' ? '做多' : '做空'} @ ${price.toFixed(2)} (${shares}股)`);
        updateUI();
        drawKLine();
    }
    
    function updateUI() {
        const price = klineData[currentIndex].close;
        const prev = currentIndex > 0 ? klineData[currentIndex - 1].close : price;
        const change = price - prev;
        document.getElementById('headerPrice').innerHTML = price.toFixed(2);
        const changeEl = document.getElementById('headerChange');
        changeEl.innerHTML = `${change >= 0 ? '+' : ''}${change.toFixed(2)}`;
        changeEl.style.color = change >= 0 ? '#ff6b6b' : '#4ecdc4';
        
        const statusEl = document.getElementById('positionStatus');
        if (position) {
            statusEl.innerHTML = `<span class="position-badge position-${position.type}">${position.type === 'long' ? '做多' : '做空'}</span>`;
        } else {
            statusEl.innerHTML = '<span class="position-badge position-empty">空仓</span>';
        }
        
        const pl = calculateCurrentProfit();
        document.getElementById('currentPL').innerHTML = `<span class="${pl >= 0 ? 'profit-positive' : 'profit-negative'}">${pl >= 0 ? '+' : ''}${pl.toFixed(2)}</span>`;
        document.getElementById('totalPL').innerHTML = `<span class="${totalProfit >= 0 ? 'profit-positive' : 'profit-negative'}">${totalProfit >= 0 ? '+' : ''}${totalProfit.toFixed(2)}</span>`;
        document.getElementById('tradeCount').innerText = tradeCount;
        document.getElementById('currentCapital').innerHTML = currentCapital.toLocaleString();
    }
    
    function advanceToNextKLine() {
        if (currentIndex >= klineData.length - 1) {
            if (isRunning) pauseGame();
            showToast('🎉 通关完成！');
            return;
        }
        currentIndex++;
        drawKLine();
        drawIndicators();
        updateUI();
        if (currentIndex >= klineData.length - 1) {
            pauseGame();
            showToast('📊 训练完成！');
        }
    }
    
    function setSpeed(speed) {
        currentSpeed = speed;
        document.getElementById('speedValue').innerText = `${speed.toFixed(1)}x`;
        document.getElementById('speedBadge').innerHTML = `⚡ ${speed.toFixed(1)}x`;
        document.getElementById('speedSlider').value = speed;
        if (isRunning) {
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(() => { if (isRunning) advanceToNextKLine(); }, 1000 / speed);
        }
    }
    
    function startGame() {
        if (intervalId) clearInterval(intervalId);
        isRunning = true;
        intervalId = setInterval(() => { if (isRunning) advanceToNextKLine(); }, 1000 / currentSpeed);
        document.getElementById('pauseBtn').innerText = '⏸️ 暂停';
    }
    
    function pauseGame() {
        isRunning = false;
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        document.getElementById('pauseBtn').innerText = '▶️ 开始';
    }
    
    function resetGame() {
        if (position) closePosition(false);
        klineData = generateKLineData();
        currentIndex = 0;
        position = null;
        totalProfit = 0;
        tradeCount = 0;
        currentCapital = INITIAL_CAPITAL;
        updateIndicators();
        drawKLine();
        drawIndicators();
        updateUI();
        if (isRunning) startGame();
        showToast('🔄 重置完成');
    }
    
    function toggleTheme() {
        document.body.classList.toggle('dark');
        drawKLine();
        drawIndicators();
    }
    
    function toggleIndicators() {
        indicatorsVisible = !indicatorsVisible;
        const area = document.getElementById('indicatorsArea');
        const chartArea = document.getElementById('chartArea');
        const btn = document.getElementById('indicatorToggleBtn');
        if (indicatorsVisible) {
            area.classList.remove('hidden');
            chartArea.classList.remove('expanded');
            btn.innerHTML = '隐藏';
        } else {
            area.classList.add('hidden');
            chartArea.classList.add('expanded');
            btn.innerHTML = '显示';
        }
        setTimeout(() => { drawKLine(); drawIndicators(); }, 100);
    }
    
    function handleResize() {
        drawKLine();
        drawIndicators();
    }
    
    function bindEvents() {
        document.getElementById('longBtn').onclick = () => openPosition('long');
        document.getElementById('shortBtn').onclick = () => openPosition('short');
        document.getElementById('closeBtn').onclick = () => closePosition(true);
        document.getElementById('resetBtn').onclick = resetGame;
        document.getElementById('pauseBtn').onclick = () => isRunning ? pauseGame() : startGame();
        document.getElementById('nextBtn').onclick = () => isRunning ? showToast('请先暂停') : advanceToNextKLine();
        document.getElementById('themeSwitch').onclick = toggleTheme;
        document.getElementById('indicatorToggleBtn').onclick = toggleIndicators;
        document.getElementById('speedSlider').oninput = (e) => setSpeed(parseFloat(e.target.value));
        window.onresize = handleResize;
    }
    
    function init() {
        updateIndicators();
        bindEvents();
        drawKLine();
        drawIndicators();
        updateUI();
        setSpeed(1.0);
        isRunning = false;
        document.getElementById('pauseBtn').innerText = '▶️ 开始';
    }
    
    init();
</script>
</body>
</html>
